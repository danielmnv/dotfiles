# ============================================================
# General
# ============================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1           # start window numbering at 1
set -g pane-base-index 1      # start pane numbering at 1
set -g renumber-windows on    # re-number windows when one is closed
set -g mouse on               # enable mouse support
set -g history-limit 10000
set -sg escape-time 0         # no delay for escape key (important for neovim)
set -g focus-events on        # needed for neovim autoread

# ============================================================
# Keybindings
# ============================================================

# Remap prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Rename window
bind , command-prompt -I "#{window_name}" "rename-window '%%'"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================
# Catppuccin Mocha Theme
# ============================================================

# Colors
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#89dceb"
thm_black="#181825"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f5c2e7"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#585b70"

# Status bar
set -g status 2
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=default,fg=#{thm_fg}"
set -g status-format[1] "#[bg=default]"

# Left status: [icon] window [index]
set -g status-left-length 100
set -g status-left "#[bg=default,fg=#{thm_green}]\ue0b6#[bg=#{thm_green},fg=#{thm_black},bold] \uf179 #[bg=default,fg=#{thm_green}]\ue0b4 "

# Right status: [folder dir] [clock time]
set -g status-right-length 100
set -g status-right "#[bg=default,fg=#{thm_pink}]\ue0b6#[bg=#{thm_pink},fg=#{thm_black}] \uf07b #{b:pane_current_path} #[bg=default,fg=#{thm_pink}]\ue0b4  #[fg=#{thm_blue}]\ue0b6#[bg=#{thm_blue},fg=#{thm_black}] \uf017 %H:%M #[bg=default,fg=#{thm_blue}]\ue0b4"

# Window status
set -g window-status-current-format "#[bg=default,fg=#{thm_fg}] #W #[fg=#{thm_orange}]\ue0b6#[bg=#{thm_orange},fg=#{thm_black},bold] #I #[bg=default,fg=#{thm_orange}]\ue0b4"
set -g window-status-format "#[bg=default,fg=#{thm_black4}] #W #I "
set -g window-status-separator "  "

# Pane borders
set -g pane-border-style "fg=#{thm_gray}"
set -g pane-active-border-style "fg=#{thm_blue}"

# Message style
set -g message-style "bg=#{thm_gray},fg=#{thm_blue}"
set -g message-command-style "bg=#{thm_gray},fg=#{thm_blue}"

# Mode style (copy mode highlight)
set -g mode-style "bg=#{thm_magenta},fg=#{thm_black}"
